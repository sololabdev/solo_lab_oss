# Example: drop-in workflow file.
# Copy to your repo at .github/workflows/pr-review.yml.
name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: sololabdev/pr-review-bot@v1
        with:
          # voice = brand-voice + tabu-word lint (live in v1)
          # code  = code review (returns "coming in v2" finding today)
          # both  = run both passes
          review-style: voice
          comment-mode: summary
          # Optional. Without it you get the free tier (10 reviews/day per repo).
          # solo-lab-api-key: ${{ secrets.SOLO_LAB_API_KEY }}

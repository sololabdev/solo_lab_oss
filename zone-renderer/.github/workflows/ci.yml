name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile-check
        run: python -m py_compile src/*.py
      - name: Install
        run: pip install playwright
      - name: Install Chromium
        run: python -m playwright install --with-deps chromium
      - name: Smoke
        run: python -c "import importlib.util,sys; spec=importlib.util.spec_from_file_location('zr','src/zone_renderer.py'); m=importlib.util.module_from_spec(spec); spec.loader.exec_module(m); print('zone_renderer importable')"
